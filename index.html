<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Proyectos de Título</title>
        <style>
            *,
			*::before,
			*::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
			}

	@import url("https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap");

	:root {
		--color-oscurisimo:  hsl(0, 50%, 10%);
		--color-oscuro: hsl(0, 65%, 45%);
		--color-normal:hsl(0, 70%, 30%);
		--color-iluminado: hsl(10, 90%, 50%);
		--color-iluminadisimo: hsl(0, 100%, 80%);
		--fuente: "Source Code Pro", monospace;
	}

	body {
		font-family: var(--fuente);
		color: var(--color-normal);
		text-align: center;
		font-size: 100%;
	}

	a {
		color: var(--color-oscuro);
		text-decoration: none;
	}

	a:hover {
		color: var(--color-oscurisimo);
		text-decoration: underline;
	}
	div#contenedor {
		margin: 1rem auto;
		width: 90%;
		max-width: 980px;
	}

	h1 {
		margin: 1rem 0;
		font-weight: 400;
		font-size: calc(100% + 3vw + 3vh);
	}

	h2 {
		margin: 3rem 0;
		font-weight: 400;
		letter-spacing: 0.25rem;
		font-size: calc(100% + 1vw + 1vh);
		color: var(--color-oscuro);
	}

	input {
		border: 0.1rem solid var(--color-iluminado);
		padding: 0.5rem 1rem;
		font-family: inherit;
		font-size: 15px;
		color: var(--color-oscuro);
		outline: none;
		margin-bottom: 1.5rem;
		width: 100%;
		display: block;
		background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="hsl(10, 90%, 50%)" class="bi bi-egg-fried" viewBox="0 0 16 16"><path d="M8 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/><path d="M13.997 5.17a5 5 0 0 0-8.101-4.09A5 5 0 0 0 1.28 9.342a5 5 0 0 0 8.336 5.109 3.5 3.5 0 0 0 5.201-4.065 3.001 3.001 0 0 0-.822-5.216zm-1-.034a1 1 0 0 0 .668.977 2.001 2.001 0 0 1 .547 3.478 1 1 0 0 0-.341 1.113 2.5 2.5 0 0 1-3.715 2.905 1 1 0 0 0-1.262.152 4 4 0 0 1-6.67-4.087 1 1 0 0 0-.2-1 4 4 0 0 1 3.693-6.61 1 1 0 0 0 .8-.2 4 4 0 0 1 6.48 3.273z"/></svg>');
		background-repeat: no-repeat;
		background-size: 1rem;
		background-position: 99% center;
	}

	input::placeholder {
		color: var(--color-iluminado);
	}

	input:focus {
		border-color: var(--color-normal);
	}

	div#contenedordetabla {
		overflow-x: auto;
		font-size: 90%;
	}

	table {
		width: 100%;
		border-collapse: collapse;
		text-align: left;
		margin-bottom: 3rem;
		}

	thead {
		background: var(--color-iluminadisimo);
		color: var(--color-oscuro);
		}

	tbody {
		color: var(--color-normal);
		}

	td,
	th {
		border: 1px solid var(--color-normal);
		padding: 0.75rem;
		}

		th:nth-child(1),
		td:nth-child(1),
		th:nth-child(4),
		td:nth-child(4) {
		text-align: left;
		}

		td:nth-child(2) {
		color: var(--color-oscuro);
		font-weight: 800;
		}

		td:nth-child(3) {
		font-style: italic;
		text-align: center;
		}
        </style>
    </head>
    <body>
        <div id="contenedor">
            <h1>⋆⋅☆⋅⋆( ☞•́⍛•̀)╭☞⋆⋅☆⋅⋆</h1>
            <h2>PROYECTOS DE TÍTULO</h2>

            <input type="text" id="elInput" placeholder="Filtrar títulos…" />
            <div id="contenedordetabla">
                <table>
                    <thead>
                        <tr>
                            <th>Titulado@</th>
                            <th>Proyecto</th>
                            <th>Nota</th>
                            <th>Categoría</th>
							<th>Prof. Guía</th>
                        </tr>
                    </thead>
                    <tbody id="este"></tbody>
                </table>
            </div>
            <small>Diseño y visualización de información</small>
        </div>

        <script>
            const t = document.querySelector("#este");
            const URL = "https://api.myjson.online/v1/records/6f6d7253-c11a-4046-9971-4950b07b492e";

            fetch(URL)
                .then((respuesta) => {
                    if (!respuesta.ok) {
                        throw new Error("Error HTTP: " + respuesta.status);
                    }
                    return respuesta.json();
                })
                .then((datos) => {
                    var trabajo = datos.data;
                    console.log(trabajo);
                    trabajo.forEach((x) => {
                        t.innerHTML += `<tr style="${x.ok == 1 ? "background-color: var(--color-iluminadisimo); color: var(--color-oscurisimo)" : ""}"><td>${x.name}</td><td>${x.title}</td><td>${x.grade}</td><td>${x.category}</td><td>${x.tutor}</td></tr>`;
                    });
                })
                .catch((error) => {
                    console.error("Algo salió mal:", error);
                });

            function sinAcentos(str) {
                return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            }

            document.getElementById("elInput").addEventListener("keyup", function () {
                const valor = sinAcentos(this.value.toLowerCase());
                document.querySelectorAll("#este tr").forEach(function (fila) {
                    fila.style.display = sinAcentos(fila.textContent.toLowerCase()).includes(valor) ? "" : "none";
                });
            });
        </script>
    </body>
</html>
